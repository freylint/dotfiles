- defaults:
    link:
      relink: true

- clean: ['~']

- link:
  ~/.zshrc:
    create: true
    force: true
    path: zshrc
  ~/.config/:
    glob: true
    create: true
    path: config/*
    relink: true

- create:
    - ~/xdg/dl
    - ~/xdg/desk
    - ~/xdg/docs
    - ~/xdg/pics
    - ~/projects
    - ~/drive

- shell:
  - [git submodule update --init --recursive, Installing submodules]
  - [chsh -s $(which zsh), Making zsh the default shell]
  - [sh -c "$(curl -fsSL https://raw.github.com/ohmyzsh/ohmyzsh/master/tools/install.sh)", Installing oh-my-zsh]
